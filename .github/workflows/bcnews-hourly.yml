name: bcnews 5min
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
permissions:
  contents: write
concurrency:
  group: bcnews-${{ github.ref_name }}
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Restore seen database cache
        uses: actions/cache/restore@v4
        with:
          path: seen.sqlite
          key: seen-db-v2-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            seen-db-v2-${{ runner.os }}-${{ github.ref_name }}-
            seen-db-v2-${{ runner.os }}-
            seen-db-v2-
      - name: Run bc news update
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_PRIVATE_CHAT_ID: ${{ secrets.TELEGRAM_PRIVATE_CHAT_ID }}
        run: |
          python bc_news_update.py
      - name: Check Telegram commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_PRIVATE_CHAT_ID: ${{ secrets.TELEGRAM_PRIVATE_CHAT_ID }}
        run: |
          python bc_news_update.py poll
      - name: Generate dashboard
        run: |
          python bc_news_update.py dashboard
      - name: Commit dashboard when changed
        run: |
          if git diff --quiet -- docs/index.html docs/.nojekyll; then
            echo "Dashboard unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/.nojekyll
          git commit -m "Update BC news dashboard"
          git push
      - name: Sync dashboard to portal
        continue-on-error: true
        env:
          PORTAL_TOKEN: ${{ secrets.PORTAL_DEPLOY_TOKEN }}
        run: |
          git clone --depth 1 \
            https://x-access-token:${PORTAL_TOKEN}@github.com/eprstyo95/eprstyo95.github.io.git \
            _portal_sync
          cp docs/index.html _portal_sync/bcnews.html
          cd _portal_sync
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bcnews.html
          if git diff --cached --quiet; then
            echo "bcnews.html unchanged – skip sync."
          else
            git commit -m "Auto-sync: BC news dashboard update"
            git push
          fi

      - name: Save seen database cache
        uses: actions/cache/save@v4
        with:
          path: seen.sqlite
          key: seen-db-v2-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
