name: bcnews dashboard
on:
  schedule:
    # Daily at 10 PM WIB = 15:00 UTC
    - cron: "0 15 * * *"
  workflow_dispatch:
concurrency:
  group: bcnews-dashboard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore seen database cache
        uses: actions/cache/restore@v4
        with:
          path: seen.sqlite
          key: seen-db-v2-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            seen-db-v2-${{ runner.os }}-${{ github.ref_name }}-
            seen-db-v2-${{ runner.os }}-
            seen-db-v2-

      - name: Generate dashboard
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_PRIVATE_CHAT_ID: ${{ secrets.TELEGRAM_PRIVATE_CHAT_ID }}
        run: python bc_news_update.py dashboard

      - name: Commit dashboard to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "📊 Update dashboard"
          git push
